name: build
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  workflow_dispatch:

jobs:
  windows-binaries:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to create releases on tag push
    steps:
      - uses: actions/checkout@v4
      - name: Install mingw-w64
        run: sudo apt-get update && sudo apt-get install -y g++-mingw-w64-x86-64
      - name: Build
        run: ./build-mingw.sh
      - uses: actions/upload-artifact@v4
        with:
          name: g1r-fixtool
          path: dist/
          retention-days: 30
      - name: Release (on tag)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/G1R-FixTool-GUI.exe
            dist/G1R-FixTool-Console.exe
            dist/G1R-SaturasFix.exe
            dist/fixes.ini
          generate_release_notes: true
