# Gothic 1 Remake — fixes list for G1R Fix Tool
#
# Format:
#   [fix]
#   title    = Menu title (Russian)
#   title_en = Menu title (English, optional)
#   desc     = Description (Russian, optional)
#   desc_en  = Description (English, optional)
#   var      = SaveVariableName
#   set      = new value
#
# The GUI shows title/desc in Russian mode and title_en/desc_en in English
# mode (falling back to title/desc if the _en field is missing). The console
# tool prefers title_en/desc_en. Lines starting with # or ; are comments.

[fix]
title = Стража и маги Воды агрятся перед Сатурасом (глава 3)
title_en = Guards and Water Mages turn hostile before Saturas (Chapter 3)
desc = Сбрасывает предупреждение стражи Нового лагеря, из-за которого вместо диалога все атакуют
desc_en = Resets the New Camp guard warning that makes everyone attack instead of talking
var = GuardPassageWaterMagesWarning_NC
set = 0
